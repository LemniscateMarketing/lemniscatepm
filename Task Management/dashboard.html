<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loop — Lemniscate</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='2' width='24' height='28' rx='4' fill='%23faf9f5' stroke='%23D97757' stroke-width='2'/%3E%3Crect x='8' y='0' width='16' height='5' rx='2.5' fill='%23D97757'/%3E%3Cpath d='M9 13l3 3 5-5' fill='none' stroke='%23D97757' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='20' y='12' width='5' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='20' width='10' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='25' width='7' height='2' rx='1' fill='%23c4c4c2'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #faf9f5;
      --bg-secondary: #F5F4EF;
      --bg-card: #ffffff;
      --text-primary: #141413;
      --text-secondary: #5c5c5a;
      --text-muted: #8c8c8a;
      --accent: #D97757;
      --accent-hover: #c4684a;
      --border: #e5e4df;
      --border-light: #eeeee9;
      --shadow: rgba(20,20,19,0.04);
      --shadow-hover: rgba(20,20,19,0.08);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      line-height: 1.5;
    }

    /* ── SETUP SCREEN ─────────────────────────────── */
    #setupScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .setup-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px var(--shadow-hover);
    }
    .setup-card h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .setup-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .setup-field { margin-bottom: 16px; }
    .setup-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .setup-field input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .setup-field input:focus { border-color: var(--accent); }
    .setup-field input::placeholder { color: var(--text-muted); }
    .setup-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 5px;
    }
    .setup-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .setup-btn:hover { background: var(--accent-hover); }
    .setup-error {
      color: #c0392b;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ── MAIN APP ─────────────────────────────────── */
    #appScreen { display: none; flex-direction: column; flex: 1; overflow: hidden; padding: 20px 24px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }

    .header-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; white-space: nowrap; }
    .repo-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .filter-bar input {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      width: 180px;
      transition: border-color 0.15s;
    }
    .filter-bar input:focus { border-color: var(--accent); }
    .filter-bar input::placeholder { color: var(--text-muted); }
    .filter-bar select {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-secondary);
      outline: none;
      cursor: pointer;
    }
    .filter-bar select:focus { border-color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .sync-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    button {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    button:hover { background: var(--bg-secondary); border-color: var(--text-muted); }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* ── VIEW TOGGLE ─────────────────────────────── */
    .view-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
    }
    .view-toggle button {
      background: transparent;
      border: none;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text-muted);
      border-radius: 6px;
    }
    .view-toggle button.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 3px var(--shadow);
    }
    .view-toggle button:hover:not(.active) { background: transparent; color: var(--text-primary); border: none; }

    /* ── LOADING / EMPTY ─────────────────────────── */
    .center-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      flex-direction: column;
      gap: 12px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BOARD ───────────────────────────────────── */
    .board {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 16px;
      flex: 1;
      min-height: 0;
    }
    .board::-webkit-scrollbar { height: 6px; }
    .board::-webkit-scrollbar-track { background: transparent; }
    .board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .column {
      background: var(--bg-secondary);
      border-radius: 12px;
      min-width: 300px;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      max-height: 100%;
    }
    .column-header {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .column-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .column-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .column-count {
      background: var(--bg-card);
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .cards {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px;
      min-height: 60px;
    }
    .cards::-webkit-scrollbar { width: 4px; }
    .cards::-webkit-scrollbar-track { background: transparent; }
    .cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── TASK CARD ───────────────────────────────── */
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 13px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 1px 3px var(--shadow);
    }
    .task-card:hover {
      box-shadow: 0 4px 12px var(--shadow-hover);
      border-color: var(--border);
    }
    .task-card:last-child { margin-bottom: 0; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1;
    }
    .priority-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .p-urgent { background: #e74c3c; }
    .p-high   { background: #e67e22; }
    .p-medium { background: #3498db; }
    .p-low    { background: #bdc3c7; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .meta-chip {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 5px;
      font-weight: 500;
    }
    .chip-assignee { background: var(--bg-secondary); color: var(--text-secondary); }
    .chip-client   { background: #eaf3fb; color: #2980b9; }
    .chip-due      { background: var(--bg-secondary); color: var(--text-muted); }
    .chip-due.overdue { background: #fdecea; color: #c0392b; }
    .chip-conflict { background: #fdecea; color: #c0392b; font-weight: 600; }
    .chip-repeat   { background: #f0f9f0; color: #27ae60; }

    /* ── LIST VIEW ───────────────────────────────── */
    .list-view {
      flex: 1;
      overflow-y: auto;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      min-height: 0;
    }
    .list-view::-webkit-scrollbar { width: 6px; }
    .list-view::-webkit-scrollbar-track { background: transparent; }
    .list-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .list-section { margin-bottom: 24px; }
    .list-section-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 4px 0 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 6px;
    }
    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 1px 2px var(--shadow);
    }
    .list-item:hover { box-shadow: 0 3px 10px var(--shadow-hover); border-color: var(--border); }
    .list-item-title { flex: 1; font-size: 14px; color: var(--text-primary); }
    .list-item-meta { display: flex; gap: 6px; align-items: center; }

    /* ── TASK MODAL ──────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20,20,19,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--bg-card);
      border-radius: 14px;
      width: 90%;
      max-width: 720px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(20,20,19,0.2);
      overflow: hidden;
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .modal-title-block { flex: 1; min-width: 0; }
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .modal-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .modal-chip {
      font-size: 12px;
      padding: 3px 9px;
      border-radius: 6px;
      font-weight: 500;
    }
    .mc-status   { background: var(--bg-secondary); color: var(--text-secondary); }
    .mc-priority { background: var(--bg-secondary); color: var(--text-secondary); }
    .mc-assignee { background: var(--bg-secondary); color: var(--text-secondary); }
    .mc-client   { background: #eaf3fb; color: #2980b9; }
    .mc-due      { background: var(--bg-secondary); color: var(--text-muted); }
    .mc-due.overdue { background: #fdecea; color: #c0392b; }
    .mc-conflict { background: #fdecea; color: #c0392b; font-weight: 700; }
    .mc-repeat   { background: #f0f9f0; color: #27ae60; }
    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text-primary); background: transparent; border: none; }
    .modal-body {
      padding: 20px 24px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-body::-webkit-scrollbar { width: 6px; }
    .modal-body::-webkit-scrollbar-track { background: transparent; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .modal-loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-footer-left { font-size: 12px; color: var(--text-muted); }
    .modal-footer-right { display: flex; gap: 8px; }

    /* Markdown content */
    .md-body { font-size: 14px; line-height: 1.65; color: var(--text-secondary); }
    .md-body h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin: 20px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border-light); }
    .md-body h2:first-child { margin-top: 0; }
    .md-body p { margin: 6px 0; }
    .md-body ul, .md-body ol { margin: 6px 0 6px 20px; }
    .md-body li { margin: 3px 0; }
    .md-body .task-check { color: var(--accent); font-weight: 600; }
    .md-body .task-uncheck { color: var(--text-muted); }
    .md-body table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 10px 0; }
    .md-body th { background: var(--bg-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .md-body td { padding: 8px 12px; border-bottom: 1px solid var(--border-light); }
    .md-body blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 8px 0; color: var(--text-muted); font-style: italic; }
    .md-body code { background: var(--bg-secondary); padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 12px; color: var(--text-primary); }

    /* ── STATUS BAR ──────────────────────────────── */
    .status-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 300;
      pointer-events: none;
    }
    .status-bar.visible { opacity: 1; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════ -->
<!--  SETUP SCREEN                                   -->
<!-- ═══════════════════════════════════════════════ -->
<div id="setupScreen">
  <div class="setup-card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <rect x="4" y="2" width="24" height="28" rx="4" fill="#faf9f5" stroke="#D97757" stroke-width="2"/>
        <rect x="8" y="0" width="16" height="5" rx="2.5" fill="#D97757"/>
        <path d="M9 13l3 3 5-5" fill="none" stroke="#D97757" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="20" y="12" width="5" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="20" width="10" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="25" width="7" height="2" rx="1" fill="#c4c4c2"/>
      </svg>
      <h2>Connect to Loop</h2>
    </div>
    <p>Enter your GitHub details to load your Loop workspace. Your token is stored only in this browser.</p>

    <div class="setup-field">
      <label>GitHub Personal Access Token</label>
      <input id="setupToken" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <div class="setup-hint">Needs <strong>repo</strong> scope. <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" style="color:var(--accent);">Create one here →</a></div>
    </div>
    <div class="setup-field">
      <label>GitHub Owner</label>
      <input id="setupOwner" type="text" placeholder="LemniscateMarketing">
    </div>
    <div class="setup-field">
      <label>Repository Name</label>
      <input id="setupRepo" type="text" placeholder="lemniscatepm">
    </div>
    <div class="setup-field">
      <label>Workspace Folder (inside repo)</label>
      <input id="setupFolder" type="text" placeholder="Task Management">
      <div class="setup-hint">Leave blank if Loop files are at the repo root.</div>
    </div>

    <button class="setup-btn" id="setupConnect">Connect →</button>
    <div class="setup-error" id="setupError"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!--  MAIN APP                                       -->
<!-- ═══════════════════════════════════════════════ -->
<div id="appScreen">
  <header>
    <div class="header-left">
      <svg width="26" height="26" viewBox="0 0 32 32" style="flex-shrink:0;">
        <rect x="4" y="2" width="24" height="28" rx="4" fill="#faf9f5" stroke="#D97757" stroke-width="2"/>
        <rect x="8" y="0" width="16" height="5" rx="2.5" fill="#D97757"/>
        <path d="M9 13l3 3 5-5" fill="none" stroke="#D97757" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="20" y="12" width="5" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="20" width="10" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="25" width="7" height="2" rx="1" fill="#c4c4c2"/>
      </svg>
      <div>
        <h1>Loop</h1>
        <div class="repo-label" id="repoLabel"></div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <input id="searchInput" type="text" placeholder="Search tasks…">
        <select id="filterAssignee"><option value="">All assignees</option></select>
        <select id="filterClient"><option value="">All clients</option></select>
        <select id="filterPriority">
          <option value="">All priorities</option>
          <option value="urgent">Urgent</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>

    <div class="header-right">
      <div class="sync-label" id="syncLabel"></div>
      <div class="view-toggle">
        <button id="btnBoard" class="active">Board</button>
        <button id="btnList">List</button>
      </div>
      <button id="btnRefresh">↻ Refresh</button>
      <button id="btnSettings" style="padding:8px 10px;" title="Settings">⚙</button>
    </div>
  </header>

  <!-- Loading state -->
  <div class="center-state" id="loadingState">
    <div class="spinner"></div>
    <span>Loading tasks…</span>
  </div>

  <!-- Empty state -->
  <div class="center-state" id="emptyState" style="display:none;">
    <span style="font-size:32px;">📋</span>
    <span>No tasks yet. Ask Claude to create some.</span>
  </div>

  <!-- Board view -->
  <div class="board" id="boardView" style="display:none;"></div>

  <!-- List view -->
  <div class="list-view" id="listView" style="display:none;"></div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!--  TASK MODAL                                     -->
<!-- ═══════════════════════════════════════════════ -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title-block">
        <div class="modal-title" id="modalTitle">Loading…</div>
        <div class="modal-chips" id="modalChips"></div>
      </div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-loading">
        <div class="spinner" style="margin:0 auto 12px;"></div>
        Loading task…
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-footer-left" id="modalMeta"></div>
      <div class="modal-footer-right">
        <a id="modalGithubLink" href="#" target="_blank">
          <button>Open in GitHub ↗</button>
        </a>
        <button id="modalCloseBtn">Close</button>
      </div>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar"></div>

<!-- ═══════════════════════════════════════════════ -->
<!--  JAVASCRIPT                                     -->
<!-- ═══════════════════════════════════════════════ -->
<script>
// ── CONFIG ────────────────────────────────────────
const CFG_KEY = 'loop_config'

function loadConfig() {
  try { return JSON.parse(localStorage.getItem(CFG_KEY)) } catch { return null }
}
function saveConfig(cfg) {
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg))
}

// ── STATUS BAR ────────────────────────────────────
const statusBar = document.getElementById('statusBar')
let statusTimer = null
function showStatus(msg, duration = 2500) {
  statusBar.textContent = msg
  statusBar.classList.add('visible')
  clearTimeout(statusTimer)
  statusTimer = setTimeout(() => statusBar.classList.remove('visible'), duration)
}

// ── GITHUB API ────────────────────────────────────
let GH = { token: '', owner: '', repo: '', folder: '' }

function ghUrl(path) {
  const base = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents`
  const prefix = GH.folder ? `/${encodeURIComponent(GH.folder)}` : ''
  return `${base}${prefix}/${path}`
}

async function ghGet(path) {
  const res = await fetch(ghUrl(path), {
    headers: { Authorization: `Bearer ${GH.token}`, Accept: 'application/vnd.github+json' }
  })
  if (!res.ok) throw new Error(`GitHub ${res.status}: ${res.statusText}`)
  const json = await res.json()
  // decode base64 content
  if (json.content) {
    json.decoded = atob(json.content.replace(/\n/g, ''))
  }
  return json
}

function ghFileUrl(path) {
  return `https://github.com/${GH.owner}/${GH.repo}/blob/main/${GH.folder ? GH.folder + '/' : ''}${path}`
}

// ── APP STATE ─────────────────────────────────────
let manifest = { tasks: [] }
let currentView = 'board'
let lastSync = null

const COLUMNS = [
  { id: 'todo',        label: 'To Do',       color: '#9b9b9b' },
  { id: 'in-progress', label: 'In Progress', color: '#3498db' },
  { id: 'waiting',     label: 'Waiting',     color: '#f39c12' },
  { id: 'in-review',   label: 'In Review',   color: '#9b59b6' },
  { id: 'done',        label: 'Done',        color: '#27ae60' },
]

// ── SETUP ─────────────────────────────────────────
const setupScreen = document.getElementById('setupScreen')
const appScreen   = document.getElementById('appScreen')

document.getElementById('setupConnect').addEventListener('click', async () => {
  const token  = document.getElementById('setupToken').value.trim()
  const owner  = document.getElementById('setupOwner').value.trim()
  const repo   = document.getElementById('setupRepo').value.trim()
  const folder = document.getElementById('setupFolder').value.trim()
  const errEl  = document.getElementById('setupError')
  errEl.style.display = 'none'

  if (!token || !owner || !repo) {
    errEl.textContent = 'Token, owner and repo are required.'
    errEl.style.display = 'block'
    return
  }

  const btn = document.getElementById('setupConnect')
  btn.textContent = 'Connecting…'
  btn.disabled = true

  GH = { token, owner, repo, folder }

  try {
    // test connection by fetching manifest
    await loadManifest()
    saveConfig({ token, owner, repo, folder })
    bootApp()
  } catch (e) {
    errEl.textContent = `Could not connect: ${e.message}. Check your token and repo details.`
    errEl.style.display = 'block'
    btn.textContent = 'Connect →'
    btn.disabled = false
  }
})

// ── BOOT ──────────────────────────────────────────
function boot() {
  const cfg = loadConfig()
  if (cfg) {
    GH = cfg
    bootApp()
  } else {
    // pre-fill known defaults
    document.getElementById('setupOwner').value = 'LemniscateMarketing'
    document.getElementById('setupRepo').value = 'lemniscatepm'
    document.getElementById('setupFolder').value = 'Task Management'
    setupScreen.style.display = 'flex'
  }
}

function bootApp() {
  setupScreen.style.display = 'none'
  appScreen.style.display = 'flex'
  document.getElementById('repoLabel').textContent = `${GH.owner}/${GH.repo}${GH.folder ? ' · ' + GH.folder : ''}`
  loadAndRender()
}

// ── LOAD MANIFEST ─────────────────────────────────
async function loadManifest() {
  const data = await ghGet('tasks/manifest.json')
  manifest = JSON.parse(data.decoded)
  lastSync = new Date()
  document.getElementById('syncLabel').textContent = `Synced ${formatTime(lastSync)}`
  return manifest
}

async function loadAndRender() {
  showLoading(true)
  try {
    await loadManifest()
    populateFilters()
    renderCurrentView()
    showLoading(false)
  } catch (e) {
    showLoading(false)
    showStatus(`Error loading tasks: ${e.message}`, 5000)
    console.error(e)
  }
}

function showLoading(on) {
  document.getElementById('loadingState').style.display = on ? 'flex' : 'none'
  document.getElementById('boardView').style.display = 'none'
  document.getElementById('listView').style.display = 'none'
  document.getElementById('emptyState').style.display = 'none'
}

// ── FILTERS ───────────────────────────────────────
function populateFilters() {
  const tasks = manifest.tasks || []

  const assignees = [...new Set(tasks.map(t => t.assignee).filter(Boolean))].sort()
  const clients   = [...new Set(tasks.map(t => t.client).filter(Boolean))].sort()

  const aSelect = document.getElementById('filterAssignee')
  const prevA = aSelect.value
  aSelect.innerHTML = '<option value="">All assignees</option>'
  assignees.forEach(a => {
    const o = document.createElement('option')
    o.value = a; o.textContent = a
    aSelect.appendChild(o)
  })
  if (prevA) aSelect.value = prevA

  const cSelect = document.getElementById('filterClient')
  const prevC = cSelect.value
  cSelect.innerHTML = '<option value="">All clients</option>'
  clients.forEach(c => {
    const o = document.createElement('option')
    o.value = c; o.textContent = c
    cSelect.appendChild(o)
  })
  if (prevC) cSelect.value = prevC
}

function getFilteredTasks() {
  const q         = document.getElementById('searchInput').value.toLowerCase().trim()
  const assignee  = document.getElementById('filterAssignee').value
  const client    = document.getElementById('filterClient').value
  const priority  = document.getElementById('filterPriority').value

  return (manifest.tasks || []).filter(t => {
    if (q && !t.title.toLowerCase().includes(q)) return false
    if (assignee && t.assignee !== assignee) return false
    if (client && t.client !== client) return false
    if (priority && t.priority !== priority) return false
    return true
  })
}

// ── RENDER ────────────────────────────────────────
function renderCurrentView() {
  const tasks = getFilteredTasks()
  const active = tasks.filter(t => t.status !== 'archived')

  if (active.length === 0 && (manifest.tasks || []).length === 0) {
    document.getElementById('emptyState').style.display = 'flex'
    return
  }

  if (currentView === 'board') renderBoard(active)
  else renderList(active)
}

function renderBoard(tasks) {
  const board = document.getElementById('boardView')
  board.innerHTML = ''
  board.style.display = 'flex'

  COLUMNS.forEach(col => {
    const colTasks = tasks.filter(t => t.status === col.id)
    const el = document.createElement('div')
    el.className = 'column'
    el.innerHTML = `
      <div class="column-header">
        <div class="column-title">
          <span class="column-dot" style="background:${col.color}"></span>
          ${col.label}
        </div>
        <span class="column-count">${colTasks.length}</span>
      </div>
      <div class="cards" id="col-${col.id}"></div>
    `
    board.appendChild(el)
    const cardsEl = el.querySelector(`#col-${col.id}`)
    colTasks.forEach(t => cardsEl.appendChild(buildCard(t)))
  })
}

function renderList(tasks) {
  const listEl = document.getElementById('listView')
  listEl.innerHTML = ''
  listEl.style.display = 'block'

  COLUMNS.forEach(col => {
    const colTasks = tasks.filter(t => t.status === col.id)
    if (colTasks.length === 0) return

    const section = document.createElement('div')
    section.className = 'list-section'
    section.innerHTML = `
      <div class="list-section-header">
        <span class="column-dot" style="background:${col.color};width:8px;height:8px;border-radius:50%;display:inline-block;"></span>
        ${col.label}
        <span style="color:var(--text-muted);font-weight:500;">${colTasks.length}</span>
      </div>
    `
    colTasks.forEach(t => {
      const item = document.createElement('div')
      item.className = 'list-item'
      item.innerHTML = `
        <span class="priority-dot ${priorityClass(t.priority)}" style="width:7px;height:7px;border-radius:50%;flex-shrink:0;"></span>
        <span class="list-item-title">${escHtml(t.title)}</span>
        <div class="list-item-meta">
          ${t.assignee ? `<span class="meta-chip chip-assignee">${escHtml(t.assignee)}</span>` : ''}
          ${t.client ? `<span class="meta-chip chip-client">${escHtml(t.client)}</span>` : ''}
          ${t.due_date ? `<span class="meta-chip chip-due ${isOverdue(t) ? 'overdue' : ''}">${formatDate(t.due_date)}</span>` : ''}
          ${t.conflict_flag ? `<span class="meta-chip chip-conflict">⚠ conflict</span>` : ''}
        </div>
      `
      item.addEventListener('click', () => openTask(t))
      section.appendChild(item)
    })
    listEl.appendChild(section)
  })
}

function buildCard(task) {
  const card = document.createElement('div')
  card.className = 'task-card'

  const chips = []
  if (task.assignee) chips.push(`<span class="meta-chip chip-assignee">${escHtml(task.assignee)}</span>`)
  if (task.client)   chips.push(`<span class="meta-chip chip-client">${escHtml(task.client)}</span>`)
  if (task.due_date) chips.push(`<span class="meta-chip chip-due ${isOverdue(task) ? 'overdue' : ''}">${formatDate(task.due_date)}</span>`)
  if (task.conflict_flag) chips.push(`<span class="meta-chip chip-conflict">⚠ conflict</span>`)
  if (task.repeat && task.repeat !== 'none') chips.push(`<span class="meta-chip chip-repeat">↻ ${task.repeat}</span>`)

  card.innerHTML = `
    <div class="card-top">
      <div class="card-title">${escHtml(task.title)}</div>
      <span class="priority-dot ${priorityClass(task.priority)}"></span>
    </div>
    ${chips.length ? `<div class="card-meta">${chips.join('')}</div>` : ''}
  `
  card.addEventListener('click', () => openTask(task))
  return card
}

// ── TASK MODAL ────────────────────────────────────
async function openTask(task) {
  const modal = document.getElementById('taskModal')
  const title = document.getElementById('modalTitle')
  const chips = document.getElementById('modalChips')
  const body  = document.getElementById('modalBody')
  const meta  = document.getElementById('modalMeta')
  const ghLink = document.getElementById('modalGithubLink')

  title.textContent = task.title
  chips.innerHTML = buildModalChips(task)
  body.innerHTML = `<div class="modal-loading"><div class="spinner" style="margin:0 auto 12px;"></div>Loading…</div>`
  meta.textContent = task.file ? `tasks/${task.file}` : ''
  ghLink.href = task.file ? ghFileUrl(`tasks/${task.file}`) : '#'
  modal.classList.add('visible')

  try {
    const data = await ghGet(`tasks/${task.file}`)
    const content = data.decoded
    body.innerHTML = `<div class="md-body">${renderMarkdownBody(content)}</div>`
    meta.textContent = `ID: ${task.id} · ${task.file}`
  } catch (e) {
    body.innerHTML = `<p style="color:var(--text-muted);font-size:14px;">Could not load task file: ${e.message}</p>`
  }
}

function buildModalChips(task) {
  const chips = []
  if (task.status)   chips.push(`<span class="modal-chip mc-status">${task.status}</span>`)
  if (task.priority) chips.push(`<span class="modal-chip mc-priority">${task.priority}</span>`)
  if (task.assignee) chips.push(`<span class="modal-chip mc-assignee">${escHtml(task.assignee)}</span>`)
  if (task.client)   chips.push(`<span class="modal-chip mc-client">${escHtml(task.client)}</span>`)
  if (task.due_date) chips.push(`<span class="modal-chip mc-due ${isOverdue(task) ? 'overdue' : ''}">Due ${formatDate(task.due_date)}</span>`)
  if (task.conflict_flag) chips.push(`<span class="modal-chip mc-conflict">⚠ Conflict</span>`)
  if (task.repeat && task.repeat !== 'none') chips.push(`<span class="modal-chip mc-repeat">↻ ${task.repeat}</span>`)
  return chips.join('')
}

document.getElementById('modalClose').addEventListener('click', closeModal)
document.getElementById('modalCloseBtn').addEventListener('click', closeModal)
document.getElementById('taskModal').addEventListener('click', e => {
  if (e.target === document.getElementById('taskModal')) closeModal()
})
function closeModal() {
  document.getElementById('taskModal').classList.remove('visible')
}

// ── SIMPLE MARKDOWN RENDERER ──────────────────────
// Renders the BODY section of a task file (strips YAML frontmatter first)
function renderMarkdownBody(raw) {
  // Strip YAML frontmatter
  let content = raw
  if (content.startsWith('---')) {
    const end = content.indexOf('\n---', 3)
    if (end !== -1) content = content.slice(end + 4).trimStart()
  }

  const lines = content.split('\n')
  let html = ''
  let inTable = false
  let tableHeader = false

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i]

    // Headings
    if (line.startsWith('## ')) {
      if (inTable) { html += '</table>'; inTable = false; }
      html += `<h2>${escHtml(line.slice(3))}</h2>`
      continue
    }
    if (line.startsWith('### ')) {
      if (inTable) { html += '</table>'; inTable = false; }
      html += `<h3 style="font-size:13px;font-weight:600;color:var(--text-secondary);margin:14px 0 6px;">${escHtml(line.slice(4))}</h3>`
      continue
    }

    // Blockquote
    if (line.startsWith('> ')) {
      if (inTable) { html += '</table>'; inTable = false; }
      html += `<blockquote>${escHtml(line.slice(2))}</blockquote>`
      continue
    }

    // Table row
    if (line.startsWith('|')) {
      if (line.match(/^\|\s*[-:]+\s*(\|\s*[-:]+\s*)*\|?\s*$/)) {
        // separator row — skip but mark next rows as body
        tableHeader = false
        continue
      }
      const cells = line.split('|').slice(1, -1).map(c => c.trim())
      if (!inTable) {
        html += '<table>'
        inTable = true
        tableHeader = true
      }
      if (tableHeader) {
        html += '<tr>' + cells.map(c => `<th>${escHtml(c)}</th>`).join('') + '</tr>'
        tableHeader = false
      } else {
        html += '<tr>' + cells.map(c => `<td>${escHtml(c)}</td>`).join('') + '</tr>'
      }
      continue
    }

    if (inTable) { html += '</table>'; inTable = false; tableHeader = false; }

    // Checklist items
    if (line.match(/^- \[x\] /i)) {
      html += `<div style="display:flex;gap:8px;padding:2px 0;font-size:13px;"><span style="color:var(--accent);">✓</span><span style="color:var(--text-muted);text-decoration:line-through;">${escHtml(line.slice(6))}</span></div>`
      continue
    }
    if (line.match(/^- \[ \] /)) {
      html += `<div style="display:flex;gap:8px;padding:2px 0;font-size:13px;"><span style="color:var(--border);border:1.5px solid var(--border);width:14px;height:14px;border-radius:3px;display:inline-block;flex-shrink:0;margin-top:1px;"></span><span>${escHtml(line.slice(6))}</span></div>`
      continue
    }

    // Bullet
    if (line.startsWith('- ')) {
      html += `<div style="padding:2px 0 2px 16px;font-size:13px;color:var(--text-secondary);">• ${escHtml(line.slice(2))}</div>`
      continue
    }

    // Italic AI note signature line
    if (line.match(/^_@.*_$/)) {
      html += `<div style="font-size:12px;color:var(--text-muted);margin-top:6px;font-style:italic;">${escHtml(line.replace(/_/g,''))}</div>`
      continue
    }

    // Empty line
    if (line.trim() === '') {
      html += '<div style="height:6px;"></div>'
      continue
    }

    // Plain paragraph
    html += `<p>${escHtml(line)}</p>`
  }

  if (inTable) html += '</table>'
  return html
}

// ── UTILS ─────────────────────────────────────────
function escHtml(str) {
  if (!str) return ''
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function priorityClass(p) {
  return { urgent: 'p-urgent', high: 'p-high', medium: 'p-medium', low: 'p-low' }[p] || 'p-low'
}

function isOverdue(task) {
  if (!task.due_date) return false
  return new Date(task.due_date) < new Date() && task.status !== 'done'
}

function formatDate(iso) {
  if (!iso) return ''
  const d = new Date(iso + 'T00:00:00')
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
}

function formatTime(date) {
  return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
}

// ── EVENT LISTENERS ───────────────────────────────
document.getElementById('btnRefresh').addEventListener('click', () => {
  showStatus('Refreshing…')
  loadAndRender()
})

document.getElementById('btnBoard').addEventListener('click', () => {
  currentView = 'board'
  document.getElementById('btnBoard').classList.add('active')
  document.getElementById('btnList').classList.remove('active')
  document.getElementById('listView').style.display = 'none'
  renderCurrentView()
})

document.getElementById('btnList').addEventListener('click', () => {
  currentView = 'list'
  document.getElementById('btnList').classList.add('active')
  document.getElementById('btnBoard').classList.remove('active')
  document.getElementById('boardView').style.display = 'none'
  renderCurrentView()
})

document.getElementById('searchInput').addEventListener('input', renderCurrentView)
document.getElementById('filterAssignee').addEventListener('change', renderCurrentView)
document.getElementById('filterClient').addEventListener('change', renderCurrentView)
document.getElementById('filterPriority').addEventListener('change', renderCurrentView)

document.getElementById('btnSettings').addEventListener('click', () => {
  if (confirm('Disconnect and change settings? This will clear your saved config.')) {
    localStorage.removeItem(CFG_KEY)
    location.reload()
  }
})

// Auto-refresh every 5 minutes
setInterval(() => {
  loadManifest().then(() => {
    populateFilters()
    renderCurrentView()
  }).catch(() => {})
}, 5 * 60 * 1000)

// ── INIT ──────────────────────────────────────────
boot()
</script>
</body>
</html>
